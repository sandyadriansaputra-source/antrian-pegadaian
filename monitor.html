<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Antrian Pegadaian - Fix Final</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial', sans-serif; background: #007d3a; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* Layar YouTube */
        .video-section { flex: 6; background: black; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Layar Nomor Antrian */
        .queue-section { flex: 4; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; color: #333; }
        h1 { font-size: 10rem; margin: 10px 0; color: #007d3a; font-weight: bold; }
        h2 { font-size: 3rem; color: #666; margin: 0; }
        .nama-nasabah { font-size: 2.5rem; color: #444; border-top: 2px solid #ddd; padding-top: 20px; width: 80%; text-align: center; }

        /* Tombol Start (Wajib Klik) */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center; }
        .btn-start { border: 4px solid #fff; padding: 30px; border-radius: 20px; font-size: 2.5rem; font-weight: bold; background: #007d3a; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startMonitor()">
        <div class="btn-start">KLIK DI SINI UNTUK<br>MULAI MONITOR & VIDEO</div>
    </div>

    <div class="container">
        <div class="video-section">
            <iframe id="youtubeVideo" src="" allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="queue-section">
            <h2>NOMOR ANTRIAN</h2>
            <h1 id="nomorDisplay">---</h1>
            <div class="nama-nasabah" id="namaDisplay">Menunggu...</div>
        </div>
    </div>

    <script>
        // --- 1. GANTI LINK GOOGLE SCRIPT ANDA DI SINI ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxr54D2wJB7Lp9Nx9au126J82orMSzEqOYjPAFc1XnprHUlmQ9h47eg3mzYkP0fXayr/exec';
        
        // --- 2. GANTI ID VIDEO YOUTUBE SAJA (CONTOH: P2Enn8Y2qCw) ---
        // Jika linknya https://www.youtube.com/watch?v=P2Enn8Y2qCw
        // Gunakan hanya kode belakangnya saja: 'P2Enn8Y2qCw'
        const videoID = 'tgbNymZ7vqY'; 

        let nomorTerakhir = "";
        let isStarted = false;

        function startMonitor() {
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            
            // Set link video secara manual saat klik untuk memicu izin Autoplay
            const finalURL = "https://www.youtube.com/embed/" + videoID + "?autoplay=1&mute=1&loop=1&playlist=" + videoID + "&rel=0&controls=0";
            document.getElementById('youtubeVideo').src = finalURL;
            
            updateMonitor();
        }

        function updateMonitor() {
            if (!isStarted) return;
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                let antrian = data.slice().reverse().find(row => row[2] === "Dipanggil");
                if (antrian && antrian[1] !== nomorTerakhir) {
                    nomorTerakhir = antrian[1];
                    document.getElementById('nomorDisplay').innerText = antrian[1];
                    document.getElementById('namaDisplay').innerText = antrian[0];
                    panggilSuara(antrian[1]);
                }
            })
            .catch(err => console.error("Koneksi Gagal:", err));
        }

        function panggilSuara(nomor) {
            let msg = new SpeechSynthesisUtterance("Nomor antrian " + nomor + ", silakan menuju loket");
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        // Cek data setiap 5 detik
        setInterval(updateMonitor, 5000);
    </script>
</body>
</html>
