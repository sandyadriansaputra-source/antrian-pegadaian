<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Antrian Pegadaian - Full Link YouTube</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial', sans-serif; background: #007d3a; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sisi Kiri: Video */
        .video-section { flex: 6; background: black; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Sisi Kanan: Info Antrian */
        .queue-section { flex: 4; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; color: #333; border-left: 10px solid #f9f9f9; }
        h2 { font-size: 3rem; margin: 0; color: #666; }
        h1 { font-size: 10rem; margin: 10px 0; color: #007d3a; font-weight: bold; }
        .nama-nasabah { font-size: 2.5rem; color: #444; font-style: italic; border-top: 2px solid #ddd; padding-top: 20px; }

        /* Footer & Overlay */
        .footer { position: absolute; bottom: 0; width: 100%; background: #005a2a; color: white; padding: 15px 0; font-size: 1.5rem; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center; }
        .btn-start { border: 3px solid white; padding: 20px 40px; border-radius: 15px; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startMonitor()">
        <div class="btn-start">KLIK UNTUK AKTIFKAN MONITOR</div>
    </div>

    <div class="container">
        <div class="video-section">
            <iframe id="youtubeVideo" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="queue-section">
            <div style="text-align: center;">
                <h2>NOMOR ANTRIAN</h2>
                <h1 id="nomorDisplay">---</h1>
                <div class="nama-nasabah" id="namaDisplay">Menunggu...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <marquee>Selamat Datang di PT Pegadaian - Solusi Keuangan Terpercaya. Silakan menunggu nomor Anda dipanggil.</marquee>
    </div>

    <script>
        // --- BAGIAN YANG PERLU ANDA UBAH ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxr54D2wJB7Lp9Nx9au126J82orMSzEqOYjPAFc1XnprHUlmQ9h47eg3mzYkP0fXayr/exec';
        const linkYouTubeUtuh = 'https://www.youtube.com/watch?v=sW_GoNs5GEo&list=PLJ7gnhfTxzw506uA8_gwPMdy47pyofhXp&index=1&pp=iAQB'; 
        // Contoh: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
        // ----------------------------------

        let nomorTerakhir = "";
        let isStarted = false;

        // Fungsi otomatis mengubah link biasa menjadi link embed agar bisa tampil di web
        function setYouTubeEmbed(url) {
    let videoId = "";
    
    try {
        if (url.includes("v=")) {
            // Format: youtube.com/watch?v=ID
            videoId = url.split("v=")[1].split("&")[0];
        } else if (url.includes("youtu.be/")) {
            // Format: youtu.be/ID
            videoId = url.split("youtu.be/")[1].split("?")[0];
        } else if (url.includes("shorts/")) {
            // Format: youtube.com/shorts/ID
            videoId = url.split("shorts/")[1].split("?")[0];
        }

        if (videoId) {
            // Parameter mute=1 wajib ada agar autoplay diizinkan oleh browser
            const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&rel=0`;
            document.getElementById('youtubeVideo').src = embedUrl;
            console.log("Video ID ditemukan: " + videoId);
        } else {
            console.error("ID Video tidak ditemukan dari link tersebut.");
        }
    } catch (e) {
        console.error("Gagal memproses link YouTube:", e);
    }
}

        if (videoId) {
            // Gunakan parameter tgbNymZ7vqY agar video mengulang dan autoplay
            const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&rel=0`;
            document.getElementById('youtubeVideo').src = embedUrl;
        } else {
            alert("Format link YouTube tidak dikenali. Pastikan link-nya benar ya!");
        }
    } catch (e) {
        console.error("Gagal memproses video:", e);
    }
}

        function startMonitor() {
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            setYouTubeEmbed(linkYouTubeUtuh);
            updateMonitor();
        }

        function updateMonitor() {
            if (!isStarted) return;
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                let antrian = data.slice().reverse().find(row => row[2] === "Dipanggil");
                if (antrian && antrian[1] !== nomorTerakhir) {
                    nomorTerakhir = antrian[1];
                    document.getElementById('nomorDisplay').innerText = antrian[1];
                    document.getElementById('namaDisplay').innerText = antrian[0];
                    panggilSuara(antrian[1]);
                }
            })
            .catch(err => console.error("Error:", err));
        }

        function panggilSuara(nomor) {
            let msg = new SpeechSynthesisUtterance(`Nomor antrian ${nomor}, silakan menuju loket`);
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        setInterval(updateMonitor, 5000);
    </script>
</body>
</html>
