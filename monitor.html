<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Antrian Pegadaian - Pro Mode</title>
    <style>
        :root { --green: #007d3a; --gold: #ffcc00; --dark: #333; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; overflow: hidden; }
        
        /* Layout */
        .container { display: flex; height: 100vh; width: 100vw; }
        .video-side { flex: 7; background: #000; border-right: 5px solid var(--gold); }
        .info-side { flex: 3; display: flex; flex-direction: column; background: white; }
        
        /* Header Info */
        .header-box { background: var(--green); color: white; padding: 25px; text-align: center; font-size: 1.8rem; font-weight: bold; }
        
        /* Nomor Antrian */
        .display-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .label { font-size: 2.5rem; color: #666; margin-bottom: -15px; }
        .number { font-size: 14rem; color: var(--green); font-weight: 900; margin: 0; }
        .name { font-size: 2.5rem; color: var(--dark); background: #e8f5e9; padding: 15px 40px; border-radius: 50px; text-align: center; width: 80%; }

        /* Ticker / Running Text */
        .ticker-wrap { position: absolute; bottom: 0; width: 100%; background: #222; color: white; padding: 15px 0; font-size: 1.6rem; border-top: 4px solid var(--gold); }

        /* Start Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; }
        .btn-start { border: 3px solid white; padding: 30px 60px; border-radius: 20px; background: var(--green); font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startSystem()">
        <div class="btn-start">AKTIFKAN MONITOR UNIT</div>
    </div>

    <div class="container">
        <div class="video-side">
            <iframe id="playerYT" width="100%" height="100%" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="info-side">
            <div class="header-box">ANTRIAN NASABAH</div>
            <div class="display-area">
                <div class="label">NOMOR</div>
                <h1 id="numDisplay">---</h1>
                <div class="name" id="nameDisplay">Menunggu...</div>
            </div>
            <div class="ticker-wrap">
                <marquee id="runText" scrollamount="7">Memuat informasi...</marquee>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwFEZwuqFiI0BFd9NkEkerGVu9K6AwLc5940xBeoCnI8YE3Flyah0genZJE5JEzBmJZ/exec';
        const linkYouTube = 'https://youtu.be/P2Enn8Y2qCw?list=RDP2Enn8Y2qCw';
        // -------------------

        let lastNum = "";
        let isActive = false;
        let currentVol = 1.0;

        function getEmbed(url) {
            let id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1].split("?")[0];
            return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&rel=0&controls=0`;
        }

        function startSystem() {
            document.getElementById('overlay').style.display = 'none';
            isActive = true;
            document.getElementById('playerYT').src = getEmbed(linkYouTube);
            syncData();
        }

        function syncData() {
            if (!isActive) return;
            fetch(scriptURL)
            .then(res => res.json())
            .then(res => {
                // Update Settings dari Sheet
                const ticker = document.getElementById('runText');
                ticker.innerText = res.pengaturan.teks;
                ticker.scrollAmount = res.pengaturan.speed;
                currentVol = res.pengaturan.vol;

                // Update Antrian
                let latest = res.antrian.slice().reverse().find(row => row[2] === "Dipanggil");
                if (latest && latest[1] !== lastNum) {
                    lastNum = latest[1];
                    document.getElementById('numDisplay').innerText = latest[1];
                    document.getElementById('nameDisplay').innerText = latest[0];
                    panggil(latest[1]);
                }
            })
            .catch(e => console.log("Koneksi terputus..."));
        }

        function panggil(n) {
            let speech = new SpeechSynthesisUtterance(`Nomor antrian ${n}, silakan menuju loket`);
            speech.lang = 'id-ID';
            speech.volume = currentVol;
            window.speechSynthesis.speak(speech);
        }

        setInterval(syncData, 5000);
    </script>
</body>
</html>
