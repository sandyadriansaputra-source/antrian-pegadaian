<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Antrian Digital - PT Pegadaian</title>
    <style>
        :root {
            --primary-green: #007d3a;
            --accent-gold: #ffcc00;
            --bg-gray: #f4f7f6;
            --text-dark: #333;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-gray); overflow: hidden; }
        
        /* Layout Utama */
        .container { display: flex; height: 100vh; width: 100vw; flex-direction: row; }

        /* Sisi Kiri: Video (Diberi Frame Modern) */
        .video-section { flex: 7; background: #000; position: relative; border-right: 5px solid var(--accent-gold); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Sisi Kanan: Info Antrian (Gaya Card Modern) */
        .queue-section { flex: 3; display: flex; flex-direction: column; background: white; position: relative; }
        
        /* Header Sisi Kanan */
        .header-right { background: var(--primary-green); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.5rem; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Card Nomor Antrian */
        .queue-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .queue-label { font-size: 2rem; color: #666; text-transform: uppercase; font-weight: 600; margin-bottom: -10px; }
        .queue-number { font-size: 12rem; color: var(--primary-green); font-weight: 900; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        .customer-name { font-size: 2.2rem; color: #444; font-weight: 500; padding: 15px 30px; border-radius: 50px; background: #e8f5e9; min-width: 250px; }

        /* Running Text (Gaya News Ticker) */
        .footer-ticker { position: absolute; bottom: 0; width: 100%; background: #222; color: #fff; padding: 12px 0; font-size: 1.3rem; border-top: 4px solid var(--accent-gold); }

        /* Overlay Awal */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary-green), #004d24); z-index: 10000; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center; }
        .btn-start { border: 2px solid rgba(255,255,255,0.5); padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .btn-start h2 { margin: 0; font-size: 2.5rem; }
    </style>
</head>
<body>

    <div id="overlay" onclick="jalankanMonitor()">
        <div class="btn-start">
            <h2>AKTIFKAN MONITOR PRO</h2>
            <p>Klik untuk memulai layanan digital</p>
        </div>
    </div>

    <div class="container">
        <div class="video-section">
            <iframe id="iframeYouTube" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="queue-section">
            <div class="header-right">INFORMASI ANTRIAN</div>
            <div class="queue-display">
                <div class="queue-label">Nomor Antrian</div>
                <h1 id="nomorDisplay">---</h1>
                <div class="customer-name" id="namaDisplay">Menunggu...</div>
            </div>
            
            <div class="footer-ticker">
                <marquee scrollamount="7">Selamat Datang di PT Pegadaian - Mengatasi Masalah Tanpa Masalah. Silakan gunakan aplikasi antrian digital untuk kenyamanan pelayanan Anda.</marquee>
            </div>
        </div>
    </div>

    <script>
        // ISI KEMBALI URL DAN LINK ANDA DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxr54D2wJB7Lp9Nx9au126J82orMSzEqOYjPAFc1XnprHUlmQ9h47eg3mzYkP0fXayr/exec';
        const linkYouTubeUtuh = 'https://youtu.be/P2Enn8Y2qCw?list=RDP2Enn8Y2qCw';

        let nomorTerakhir = "";
        let isStarted = false;

        function prosesLinkYouTube(url) {
            let idVideo = "";
            if (url.includes("v=")) {
                idVideo = url.split("v=")[1].split("&")[0];
            } else if (url.includes("youtu.be/")) {
                idVideo = url.split("youtu.be/")[1].split("?")[0];
            }
            return `https://www.youtube.com/embed/${idVideo}?autoplay=1&mute=1&loop=1&playlist=${idVideo}&rel=0&controls=0&showinfo=0`;
        }

        function jalankanMonitor() {
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            document.getElementById('iframeYouTube').src = prosesLinkYouTube(linkYouTubeUtuh);
            updateAntrian();
        }

        function updateAntrian() {
            if (!isStarted) return;
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                let antrian = data.slice().reverse().find(row => row[2] === "Dipanggil");
                if (antrian && antrian[1] !== nomorTerakhir) {
                    nomorTerakhir = antrian[1];
                    document.getElementById('nomorDisplay').innerText = antrian[1];
                    document.getElementById('namaDisplay').innerText = antrian[0];
                    panggilSuara(antrian[1]);
                }
            })
            .catch(err => console.log("Reconnecting..."));
        }

        function panggilSuara(nomor) {
            let pesan = new SpeechSynthesisUtterance(`Nomor antrian ${nomor}, silakan menuju loket pelayanan`);
            pesan.lang = 'id-ID';
            pesan.rate = 0.85;
            window.speechSynthesis.speak(pesan);
        }

        setInterval(updateAntrian, 5000);
    </script>
</body>
</html>
