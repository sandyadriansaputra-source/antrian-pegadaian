<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Antrian Pegadaian - Stabil</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial; background: #007d3a; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .video-section { flex: 6; background: black; }
        .queue-section { flex: 4; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; color: #333; }
        h1 { font-size: 10rem; margin: 0; color: #007d3a; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; text-align: center; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startMonitor()">
        <div style="border: 2px solid white; padding: 20px;">KLIK UNTUK AKTIFKAN MONITOR</div>
    </div>

    <div class="container">
        <div class="video-section">
            <iframe id="youtubeVideo" width="100%" height="100%" 
                src="" 
                allow="autoplay; encrypted-media" allowfullscreen>
            </iframe>
        </div>
        <div class="queue-section">
            <h2>ANTRIAN</h2>
            <h1 id="nomorDisplay">---</h1>
            <h3 id="namaDisplay">Menunggu...</h3>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxr54D2wJB7Lp9Nx9au126J82orMSzEqOYjPAFc1XnprHUlmQ9h47eg3mzYkP0fXayr/exec';
        const videoID = 'sW_GoNs5GEo&list=PLJ7gnhfTxzw506uA8_gwPMdy47pyofhXp'; // Ganti dengan ID video (11 karakter di belakang v=)

        function startMonitor() {
            document.getElementById('overlay').style.display = 'none';
            // Set URL Video saat tombol diklik agar autoplay diizinkan browser
            document.getElementById('youtubeVideo').src = `https://www.youtube.com/embed/${videoID}?autoplay=1&mute=1&loop=1&playlist=${videoID}`;
            
            setInterval(updateData, 5000); // Cek antrian setiap 5 detik
        }

        function updateData() {
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                let antrian = data.slice().reverse().find(row => row[2] === "Dipanggil");
                if (antrian) {
                    document.getElementById('nomorDisplay').innerText = antrian[1];
                    document.getElementById('namaDisplay').innerText = antrian[0];
                }
            });
        }
    </script>
</body>
</html>
