<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Antrian Pegadaian - Locked Version</title>
    <style>
        :root { 
            --green-pegadaian: #007d3a; 
            --green-darker: #004d24; 
            --gold-pegadaian: #ffcc00; 
            --dark-text: #333; 
        }
        
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; overflow: hidden; }
        
        .container { display: flex; height: 100vh; width: 100vw; flex-direction: row; }
        
        .video-side { flex: 7; background: #000; border-right: 5px solid var(--gold-pegadaian); position: relative; padding-bottom: 45px; }
        iframe { width: 100%; height: 100%; border: none; }

        .info-side { flex: 3; display: flex; flex-direction: column; background: white; padding-bottom: 45px; height: 100%; }
        
        .header-right { 
            background: var(--green-pegadaian); 
            color: white; 
            padding: 3vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 20vh;
        }
        
        .pegadaian-logo {
            max-width: 60%;
            height: auto;
            display: block;
            margin-bottom: 1.5vh;
        }
        
        .header-text {
            font-size: 3.5vh;
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
            text-align: center;
        }
        
        .display-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        
        .label { font-size: 4vh; color: #777; font-weight: 600; margin-bottom: 1vh; }
        .number { 
            font-size: 25vh; 
            color: var(--green-pegadaian); 
            font-weight: 900; 
            margin: 0; 
            line-height: 1;
        }
        
        .name { 
            font-size: 4vh; 
            color: var(--dark-text); 
            background: #e8f5e9; 
            padding: 2vh 4vh; 
            border-radius: 50px; 
            text-align: center; 
            width: 90%; 
            margin-top: 2vh;
            word-wrap: break-word;
        }

        .ticker-wrap { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: var(--green-darker); 
            color: white; 
            padding: 10px 0; 
            font-size: 3vh; 
            border-top: 4px solid var(--gold-pegadaian); 
            z-index: 999; 
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; }
        .btn-start { border: 3px solid var(--gold-pegadaian); padding: 4vh 8vh; border-radius: 20px; background: var(--green-pegadaian); font-size: 5vh; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startSystem()">
        <div class="btn-start">AKTIFKAN MONITOR UNIT</div>
    </div>

    <div class="container">
        <div class="video-side">
            <iframe id="playerYT" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="info-side">
            <div class="header-right">
                <img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png" 
                     alt="Logo PT Pegadaian" 
                     class="pegadaian-logo">
                <h2 class="header-text">SISTEM ANTRIAN</h2>
            </div>
            <div class="display-area">
                <div class="label">NOMOR</div>
                <h1 id="numDisplay" class="number">---</h1>
                <div class="name" id="namaDisplay">Menunggu...</div>
            </div>
        </div>
    </div>

    <div class="ticker-wrap">
        <marquee id="runText" scrollamount="7">Sinkronisasi data...</marquee>
    </div>

    <script>
        // --- KONFIGURASI UNIT (KUNCI) ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz0FTmwCdTvXaA1U0KsKLeroziPclX9zeeJDyITZkkWKOYKwsCmYkZDuJ92S98g9OSO/exec';
        const linkYouTube = 'https://www.youtube.com/watch?v=P2Enn8Y2qCw'; 
        // --------------------------------
        
        let lastNum = "";
        let isActive = false;
        let currentVol = 1.0;

        function getEmbed(url) {
            let id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("youtu.be/")[1].split("?")[0];
            // FIX: mute=0 agar suara muncul
            return `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&loop=1&playlist=${id}&rel=0&controls=0`;
        }

        function startSystem() {
            document.getElementById('overlay').style.display = 'none';
            isActive = true;
            document.getElementById('playerYT').src = getEmbed(linkYouTube);
            syncData();
        }

        function syncData() {
            if (!isActive) return;
            fetch(scriptURL)
            .then(res => res.json())
            .then(res => {
                const ticker = document.getElementById('runText');
                ticker.innerText = res.pengaturan.teks;
                ticker.scrollAmount = res.pengaturan.speed;
                currentVol = res.pengaturan.vol;

                let latest = res.antrian.slice().reverse().find(row => row[2] === "Dipanggil");
                if (latest && latest[1] !== lastNum) {
                    lastNum = latest[1];
                    document.getElementById('numDisplay').innerText = latest[1];
                    document.getElementById('namaDisplay').innerText = latest[0];
                    panggilSuara(latest[1]);
                }
            })
            .catch(e => console.log("Reconnecting..."));
        }

        function panggilSuara(n) {
            let speech = new SpeechSynthesisUtterance(`Nomor antrian ${n}, silakan menuju loket pelayanan`);
            speech.lang = 'id-ID';
            speech.volume = currentVol;
            speech.rate = 0.85;
            window.speechSynthesis.speak(speech);
        }

        setInterval(syncData, 5000);
    </script>
</body>
</html>
