<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitor Antrian Pegadaian</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #007d3a; color: white; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .box { background: white; color: #333; padding: 50px; border-radius: 30px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { font-size: 200px; margin: 0; color: #007d3a; }
        h2 { font-size: 50px; margin-bottom: 10px; color: #666; }
        .footer { margin-top: 30px; font-size: 24px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>NOMOR ANTRIAN</h2>
        <h1 id="nomorDisplay">---</h1>
        <h2 id="namaDisplay">Menunggu...</h2>
    </div>
    <div class="footer">Silakan menuju Loket Pelayanan</div>

    <script>
        const scriptURL = 'PASTE_URL_WEB_APP_ANDA_DI_SINI';
        let nomorTerakhir = "";

        function updateMonitor() {
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                // Mencari data terbaru yang statusnya "Dipanggil"
                let antrian = data.reverse().find(row => row[2] === "Dipanggil");
                
                if (antrian && antrian[1] !== nomorTerakhir) {
                    nomorTerakhir = antrian[1];
                    document.getElementById('nomorDisplay').innerText = antrian[1];
                    document.getElementById('namaDisplay').innerText = antrian[0];
                    panggilSuara(antrian[1]);
                }
            });
        }

        function panggilSuara(nomor) {
            let msg = new SpeechSynthesisUtterance(`Nomor antrian ${nomor}, silakan menuju loket`);
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        // Cek perubahan data setiap 3 detik
        setInterval(updateMonitor, 3000);
    </script>
</body>
</html>
