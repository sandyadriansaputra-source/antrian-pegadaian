<!DOCTYPE html>
<html>
<head>
    <title>Panel Petugas - Pegadaian</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #e8f5e9; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007d3a; color: white; }
        button { background: #2196F3; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>Daftar Antrian Hari Ini</h1>
    <button onclick="muatData()">Refresh Daftar</button>
    <br><br>
    <table id="tabelAntrian">
        <thead>
            <tr>
                <th>Nama Nasabah</th>
                <th>Nomor</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        const scriptURL = 'PASTE_URL_BARU_ANDA_DI_SINI'; // Pastikan URL-nya benar

function muatData() {
    console.log("Sedang mengambil data...");
    fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
        console.log("Data diterima:", data);
        if (data.length === 0) {
            alert("Koneksi berhasil, tapi tidak ada data di Google Sheets!");
            return;
        }
        
        let html = '';
        data.forEach(row => {
            // Pastikan row[0] adalah Nama, row[1] adalah Nomor, row[2] adalah Status
            html += `<tr>
                <td>${row[0] || '-'}</td>
                <td>${row[1] || '-'}</td>
                <td>${row[2] || '-'}</td>
                <td><button onclick="panggil('${row[1]}')">Panggil</button></td>
            </tr>`;
        });
        document.querySelector('#tabelAntrian tbody').innerHTML = html;
    })
    .catch(err => {
        console.error("Error:", err);
        alert("Gagal mengambil data. Cek apakah URL sudah benar dan 'Anyone' bisa akses.");
    });
}
muatData();
        
</script>
</body>
</html>
